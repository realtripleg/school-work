<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f1a;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 40px;
            color: #e0e0e0;
        }
        .games {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-width: 900px;
            width: 100%;
        }
        .game-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            padding: 30px 24px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: transform 0.15s, border-color 0.15s;
        }
        .game-card:hover {
            transform: translateY(-4px);
            border-color: #5a5a8a;
        }
        .game-card .icon {
            font-size: 48px;
            margin-bottom: 14px;
        }
        .game-card .title {
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Games</h1>
    <div class="games">
        <a href="espn-baseball/" class="game-card">
            <div class="icon">&#9918;</div>
            <div class="title">ESPN Arcade Baseball</div>
        </a>
        <a href="soflo-wheelie-life/" class="game-card">
            <div class="icon">&#127949;</div>
            <div class="title">Soflo Wheelie Life</div>
        </a>
        <!-- add more game cards here -->
    </div>
</body>
</html>
