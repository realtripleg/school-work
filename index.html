<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #07070d;
            --surface: #0d0d16;
            --surface-2: #12121e;
            --border: rgba(191, 155, 48, 0.06);
            --border-hover: rgba(191, 155, 48, 0.22);
            --gold: #c9a227;
            --gold-light: #f5d442;
            --gold-dim: #8a7428;
            --text: #9e9788;
            --text-bright: #e8dcc8;
            --radius: 12px;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 70px 24px 100px;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 500px; height: 500px;
            top: -100px; left: -50px;
            background: rgba(212, 169, 64, 0.12);
            animation: float1 18s ease-in-out infinite;
        }
        .blob-2 {
            width: 450px; height: 450px;
            bottom: -80px; right: -50px;
            background: rgba(191, 155, 48, 0.08);
            animation: float2 22s ease-in-out infinite;
        }
        .blob-3 {
            width: 300px; height: 300px;
            top: 40%; left: 50%;
            background: rgba(245, 212, 66, 0.05);
            animation: float3 26s ease-in-out infinite;
        }
        @keyframes float1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(80px,60px)} 66%{transform:translate(-40px,30px)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-60px,-40px)} 66%{transform:translate(50px,-20px)} }
        @keyframes float3 { 0%,100%{transform:translate(-50%,0)} 33%{transform:translate(-30%,40px)} 66%{transform:translate(-70%,-30px)} }

        .noise {
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }

        /* --- HEADER --- */
        .header {
            text-align: center;
            margin-bottom: 56px;
            position: relative;
            z-index: 1;
            animation: fadeDown 0.6s ease;
        }
        .greeting {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, #fce38a, #f5d442, #c9a227, #f5d442, #fce38a);
            background-size: 400% 400%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 5s ease infinite;
            margin-bottom: 6px;
            letter-spacing: -1px;
        }
        .subtext {
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--gold-dim);
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .divider {
            width: 48px; height: 2px;
            background: var(--gold);
            margin: 22px auto 0;
            border-radius: 1px;
            opacity: 0.4;
        }

        @keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        @keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

        /* --- GAME GRID --- */
        .games {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
            max-width: 860px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .game-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 16px;
            animation: fadeUp 0.5s ease backwards;
        }
        .game-card:nth-child(1) { animation-delay: 0.03s; }
        .game-card:nth-child(2) { animation-delay: 0.06s; }
        .game-card:nth-child(3) { animation-delay: 0.09s; }
        .game-card:nth-child(4) { animation-delay: 0.12s; }
        .game-card:nth-child(5) { animation-delay: 0.15s; }
        .game-card:nth-child(6) { animation-delay: 0.18s; }

        .game-card .icon-wrap {
            flex-shrink: 0;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-2);
            border-right: 1px solid var(--border);
            font-size: 28px;
            transition: background 0.3s, border-color 0.3s;
        }

        .game-card .info {
            padding: 18px 20px 18px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .game-card .title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-bright);
            transition: color 0.3s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-card .tag {
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            color: var(--gold-dim);
            letter-spacing: 0.5px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .game-card .arrow {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%) translateX(-4px);
            font-size: 14px;
            color: var(--gold-dim);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .game-card:hover {
            transform: translateY(-3px);
            border-color: var(--border-hover);
            background: var(--surface-2);
            box-shadow:
                0 4px 16px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(191, 155, 48, 0.06);
        }
        .game-card:hover .icon-wrap {
            background: rgba(191, 155, 48, 0.08);
            border-color: rgba(191, 155, 48, 0.12);
        }
        .game-card:hover .title { color: var(--gold-light); }
        .game-card:hover .tag { opacity: 1; }
        .game-card:hover .arrow {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        .game-card:active {
            transform: translateY(-1px);
            transition-duration: 0.1s;
        }

        /* collection cards get a subtle accent */
        .game-card.collection {
            border-left: 2px solid var(--gold-dim);
        }
        .game-card.collection:hover {
            border-left-color: var(--gold);
        }

        /* --- NAME PROMPT --- */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(3, 3, 8, 0.96);
            backdrop-filter: blur(24px);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
            animation: overlayIn 0.4s ease;
        }
        .overlay.hidden { display: none; }
        @keyframes overlayIn { from{opacity:0} to{opacity:1} }

        .name-box {
            background: var(--surface);
            border: 1px solid rgba(191, 155, 48, 0.2);
            border-radius: 16px;
            padding: 48px 44px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 0 80px rgba(191, 155, 48, 0.04);
            animation: boxIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.15s backwards;
        }
        @keyframes boxIn { from{opacity:0;transform:translateY(16px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }

        .name-box h2 {
            font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, #fce38a, #c9a227);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 6px;
        }
        .name-box p {
            color: var(--gold-dim);
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 28px;
        }
        .name-box input {
            width: 100%;
            padding: 13px 16px;
            border: 1px solid rgba(191, 155, 48, 0.12);
            border-radius: var(--radius);
            background: var(--bg);
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .name-box input:focus {
            border-color: rgba(191, 155, 48, 0.4);
            box-shadow: 0 0 0 3px rgba(191, 155, 48, 0.06);
        }
        .name-box input::placeholder { color: #2a2a38; }
        .name-box button {
            margin-top: 14px;
            width: 100%;
            padding: 13px;
            border: 1px solid var(--gold);
            border-radius: var(--radius);
            background: transparent;
            color: var(--gold);
            font-size: 13px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s;
        }
        .name-box button:hover {
            background: var(--gold);
            color: var(--bg);
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="noise"></div>

    <div class="overlay" id="nameOverlay">
        <div class="name-box">
            <h2>Welcome</h2>
            <p>what should we call you?</p>
            <input type="text" id="nameInput" placeholder="name" autocomplete="off" maxlength="24">
            <button id="nameBtn">enter</button>
        </div>
    </div>

    <div class="header">
        <div class="greeting" id="greeting"></div>
        <div class="subtext" id="subtext"></div>
        <div class="divider"></div>
    </div>

    <div class="games">
        <a href="papas-games/" class="game-card collection">
            <div class="icon-wrap">&#127829;</div>
            <div class="info">
                <div class="title">Papa's Games</div>
                <div class="tag">17 games</div>
            </div>
            <div class="arrow">&rarr;</div>
        </a>
        <a href="vex-games/" class="game-card collection">
            <div class="icon-wrap">&#127939;</div>
            <div class="info">
                <div class="title">Vex Games</div>
                <div class="tag">7 games</div>
            </div>
            <div class="arrow">&rarr;</div>
        </a>
        <a href="espn-baseball/" class="game-card">
            <div class="icon-wrap">&#9918;</div>
            <div class="info">
                <div class="title">ESPN Arcade Baseball</div>
                <div class="tag">flash / ruffle</div>
            </div>
            <div class="arrow">&rarr;</div>
        </a>
        <a href="soflo-wheelie-life/" class="game-card">
            <div class="icon-wrap">&#127949;</div>
            <div class="info">
                <div class="title">Soflo Wheelie Life</div>
                <div class="tag">turbowarp</div>
            </div>
            <div class="arrow">&rarr;</div>
        </a>
        <a href="gold-digger/" class="game-card">
            <div class="icon-wrap">&#9935;</div>
            <div class="info">
                <div class="title">Gold Digger FRVR</div>
                <div class="tag">html5</div>
            </div>
            <div class="arrow">&rarr;</div>
        </a>
        <a href="snow-rider-3d/" class="game-card">
            <div class="icon-wrap">&#9975;</div>
            <div class="info">
                <div class="title">Snow Rider 3D</div>
                <div class="tag">unity webgl</div>
            </div>
            <div class="arrow">&rarr;</div>
        </a>
    </div>

    <script>
        const greetings = [
            name => `Hey, ${name}!`,
            name => `What's good, ${name}?`,
            name => `Welcome back, ${name}.`,
            name => `Hello, ${name}!`,
            name => `Yo ${name}!`,
        ];
        const subtexts = [
            name => `ready when you are, ${name}.`,
            name => `pick your poison.`,
            name => `what are we playing today?`,
            name => `let's get into it.`,
            name => `choose wisely.`,
        ];
        function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + days * 86400000);
            document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + d.toUTCString() + ";path=/;SameSite=Lax";
        }
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
            return match ? decodeURIComponent(match[1]) : null;
        }
        function showGreeting(name) {
            const g = greetings[Math.floor(Math.random() * greetings.length)];
            const s = subtexts[Math.floor(Math.random() * subtexts.length)];
            document.getElementById('greeting').textContent = g(name);
            document.getElementById('subtext').textContent = s(name);
        }
        const saved = getCookie('playerName');
        if (saved) {
            document.getElementById('nameOverlay').classList.add('hidden');
            showGreeting(saved);
        }
        document.getElementById('nameBtn').addEventListener('click', submit);
        document.getElementById('nameInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') submit();
        });
        function submit() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) return;
            setCookie('playerName', name, 365);
            document.getElementById('nameOverlay').classList.add('hidden');
            showGreeting(name);
        }
    </script>
</body>
</html>
