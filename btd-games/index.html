<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloons Tower Defense</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #07070d; --surface: #0d0d16; --surface-2: #12121e;
            --border: rgba(191,155,48,0.06); --border-hover: rgba(191,155,48,0.22);
            --gold: #c9a227; --gold-light: #f5d442; --gold-dim: #8a7428;
            --text-bright: #e8dcc8; --radius: 12px;
        }
        body {
            background: var(--bg); min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif; color: #fff;
            display: flex; flex-direction: column; align-items: center;
            padding: 70px 24px 100px; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .blob { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
        .blob-1 { width: 500px; height: 500px; top: -100px; right: -50px; background: rgba(212,169,64,0.12); animation: f1 22s ease-in-out infinite; }
        .blob-2 { width: 400px; height: 400px; bottom: -80px; left: -50px; background: rgba(191,155,48,0.08); animation: f2 28s ease-in-out infinite; }
        @keyframes f1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(80px,60px)} 66%{transform:translate(-40px,30px)} }
        @keyframes f2 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-60px,-40px)} 66%{transform:translate(50px,-20px)} }
        .noise { position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }

        .back {
            position: fixed; top: 20px; left: 24px; z-index: 10;
            color: var(--gold-dim); text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; font-weight: 500; letter-spacing: 0.5px;
            transition: color 0.2s;
        }
        .back:hover { color: var(--gold-light); }

        @keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

        .header {
            text-align: center; margin-bottom: 48px;
            position: relative; z-index: 1; animation: fadeDown 0.6s ease;
        }
        .header h1 {
            font-size: 32px; font-weight: 800; letter-spacing: -1px;
            background: linear-gradient(135deg, #fce38a, #f5d442, #c9a227, #f5d442, #fce38a);
            background-size: 400% 400%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; animation: shimmer 5s ease infinite;
        }
        .header .count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; color: var(--gold-dim); margin-top: 8px;
            letter-spacing: 0.5px;
        }
        .divider { width: 48px; height: 2px; background: var(--gold); margin: 18px auto 0; border-radius: 1px; opacity: 0.4; }

        .games {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 10px; max-width: 860px; width: 100%;
            position: relative; z-index: 1;
        }
        .game-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-decoration: none; color: #fff;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative; overflow: hidden;
            display: flex; align-items: center; gap: 14px;
            animation: fadeUp 0.4s ease backwards;
        }
        .game-card:nth-child(1){animation-delay:.04s} .game-card:nth-child(2){animation-delay:.08s}
        .game-card:nth-child(3){animation-delay:.12s} .game-card:nth-child(4){animation-delay:.16s}

        .game-card .icon-wrap {
            flex-shrink: 0; width: 56px; height: 56px;
            display: flex; align-items: center; justify-content: center;
            background: var(--surface-2);
            border-right: 1px solid var(--border);
            font-size: 24px; transition: background 0.3s, border-color 0.3s;
        }
        .game-card .title {
            font-size: 13px; font-weight: 600; color: var(--text-bright);
            padding: 16px 16px 16px 0;
            transition: color 0.3s;
        }
        .game-card .arrow {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%) translateX(-4px);
            font-size: 13px; color: var(--gold-dim);
            opacity: 0; transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
        }
        .game-card:hover {
            transform: translateY(-2px);
            border-color: var(--border-hover);
            background: var(--surface-2);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 0 1px rgba(191,155,48,0.06);
        }
        .game-card:hover .icon-wrap { background: rgba(191,155,48,0.08); border-color: rgba(191,155,48,0.12); }
        .game-card:hover .title { color: var(--gold-light); }
        .game-card:hover .arrow { opacity: 1; transform: translateY(-50%) translateX(0); }
        .game-card:active { transform: translateY(0); transition-duration: 0.1s; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="noise"></div>
    <a href="/" class="back">&larr; back</a>
    <div class="header">
        <h1>Bloons Tower Defense</h1>
        <div class="count">4 games</div>
        <div class="divider"></div>
    </div>
    <div class="games">
        <a href="../btd/" class="game-card"><div class="icon-wrap">&#127880;</div><div class="title">Bloons TD</div><div class="arrow">&rarr;</div></a>
        <a href="../btd2/" class="game-card"><div class="icon-wrap">&#127880;</div><div class="title">Bloons TD 2</div><div class="arrow">&rarr;</div></a>
        <a href="../btd3/" class="game-card"><div class="icon-wrap">&#127880;</div><div class="title">Bloons TD 3</div><div class="arrow">&rarr;</div></a>
        <a href="../btd4/" class="game-card"><div class="icon-wrap">&#127880;</div><div class="title">Bloons TD 4</div><div class="arrow">&rarr;</div></a>
    </div>
</body>
</html>
