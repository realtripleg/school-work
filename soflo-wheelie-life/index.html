<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soflo Wheelie Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        .warning-box {
            background: #1a1a2e;
            border: 2px solid #ff9800;
            border-radius: 12px;
            padding: 40px 50px;
            text-align: center;
            max-width: 420px;
            box-shadow: 0 0 40px rgba(255, 152, 0, 0.2);
        }
        .warning-icon {
            font-size: 52px;
            margin-bottom: 16px;
        }
        .warning-box h1 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #ff9800;
        }
        .warning-box p {
            font-size: 15px;
            color: #ccc;
            line-height: 1.5;
        }
        .countdown {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
        .countdown span {
            color: #ff9800;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <a href="/school-work/" style="position:fixed;top:12px;left:20px;color:#aaa;text-decoration:none;font-size:14px;z-index:10">&larr; Back to Games</a>
    <div class="warning-box">
        <div class="warning-icon">&#9889;</div>
        <h1>Turn Off Low Power Mode</h1>
        <p>This game runs best with Low Power Mode disabled. Turn it off in your device settings for the best experience.</p>
        <div class="countdown">Launching in <span id="timer">3</span>s...</div>
    </div>
    <script>
        let t = 3;
        const el = document.getElementById("timer");
        const interval = setInterval(() => {
            t--;
            el.textContent = t;
            if (t <= 0) {
                clearInterval(interval);
                window.location.href = "game.html";
            }
        }, 1000);
    </script>
</body>
</html>
