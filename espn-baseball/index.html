<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPN Arcade Baseball</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: Arial, sans-serif; }
        .back { position: fixed; top: 12px; left: 20px; color: #aaa; text-decoration: none; font-size: 14px; z-index: 10; }
        .back:hover { color: #fff; }
        #ruffle { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <a href="/" class="back">&larr; Back</a>
    <div id="ruffle"></div>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = { publicPath: "/ruffle/" };
    </script>
    <script src="/ruffle/ruffle.js"></script>
    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("ruffle");
            player.style.width = "100%";
            player.style.height = "100%";
            container.appendChild(player);
            player.load("game.swf");
        });
    </script>
</body>
</html>
