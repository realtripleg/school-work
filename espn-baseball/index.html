<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPN Arcade Baseball</title>
    <script src="ruffle/ruffle.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            background: rgba(0,0,0,0.5);
            z-index: 10;
        }
        .top-bar a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }
        .top-bar a:hover { color: #fff; }
        h1 {
            margin-bottom: 16px;
            font-size: 24px;
            color: #e0e0e0;
        }
        #game-container {
            border: 2px solid #333;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        #game-container object { display: block; }
    </style>
</head>
<body>
    <div class="top-bar"><a href="/">&larr; Back to Games</a></div>
    <h1>ESPN Arcade Baseball</h1>
    <div id="game-container">
        <object data="game.swf" width="800" height="600">
            <param name="movie" value="game.swf">
        </object>
    </div>
</body>
</html>
